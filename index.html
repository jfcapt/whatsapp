<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#00a884" />
  <meta name="description" content="A peer-to-peer WhatsApp clone with messaging and video calling" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="WhatsApp" />
  <meta name="application-name" content="WhatsApp Clone P2P" />
  <meta name="msapplication-TileColor" content="#00a884" />
  <meta name="msapplication-config" content="none" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/icon.svg" />

  <title>WhatsApp Clone P2P</title>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((registration) => {
            console.log('ServiceWorker registered:', registration.scope);

            // Check for updates
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  console.log('New content available, please refresh.');
                }
              });
            });
          })
          .catch((error) => {
            console.error('ServiceWorker registration failed:', error);
          });

        // Request notification permission
        if ('Notification' in window && Notification.permission === 'default') {
          console.log('Requesting notification permission...');
        }
      });
    }

    // Handle online/offline status
    window.addEventListener('online', () => {
      console.log('App is online');
      document.dispatchEvent(new CustomEvent('app-online'));
    });

    window.addEventListener('offline', () => {
      console.log('App is offline');
      document.dispatchEvent(new CustomEvent('app-offline'));
    });
  </script>
</body>
</html>
